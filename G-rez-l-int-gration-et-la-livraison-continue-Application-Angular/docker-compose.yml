version: '3.8'
services:
  front:
    container_name: workshop-front
    image: workshop-front
    build: .
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
    # Optionnel : variables d'environnement, volumes, etc.
  tests:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - CHROME_BIN=/usr/bin/google-chrome
    command: sh -c "npm ci && npm install google-chrome-stable --no-save && npm test -- --watch=false --browsers=ChromeHeadless"
    depends_on:
      - front
