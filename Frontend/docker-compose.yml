version: '3.8'
services:
  front:
    container_name: workshop-front
    image: workshop-front
    build: .
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
    # Optionnel : variables d'environnement, volumes, etc.
  tests:
    image: node:24
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - CHROME_BIN=/usr/bin/google-chrome
    command: sh -c "apt-get update && apt-get install -y wget gnupg && wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add - && echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' > /etc/apt/sources.list.d/google-chrome.list && apt-get update && apt-get install -y google-chrome-stable && npm ci && npm test -- --watch=false --browsers=ChromeHeadless"
    depends_on:
      - front
