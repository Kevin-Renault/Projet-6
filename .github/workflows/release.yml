name: Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      packages: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Load shared path config
        run: ./scripts/load-path-env.sh
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install --global semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/commit-analyzer @semantic-release/exec @semantic-release/release-notes-generator
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Run semantic-release          
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}          
        run: npx semantic-release
      - name: Login to GHCR
        run: |
          echo ${{ secrets.ACTIONS_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push backend release image
        if: env.RELEASE_VERSION != ''
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-v${RELEASE_VERSION}
          docker build -t ghcr.io/$REPO:$TAG "$JAVA_DIR"
          docker push ghcr.io/$REPO:$TAG     
      - name: Build and push frontend release image
        if: env.RELEASE_VERSION != ''
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-v${RELEASE_VERSION}
          docker build -t ghcr.io/$REPO:$TAG "$ANGULAR_DIR"
          docker push ghcr.io/$REPO:$TAG

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend release image
        if: env.RELEASE_VERSION != ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.JAVA_DIR }}
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/projet-6:backend-v${{ env.RELEASE_VERSION }}

      - name: Build and push frontend release image
        if: env.RELEASE_VERSION != ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.ANGULAR_DIR }}
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/projet-6:frontend-v${{ env.RELEASE_VERSION }}

