name: CI Modular # Nom du workflow affiché dans GitHub Actions

on: # Déclencheurs du workflow
  push: # Sur chaque push
    branches: [ '**' ] # Toutes les branches
  pull_request: # Sur chaque pull request
    branches: [ '**' ] # Toutes les branches

jobs: # Définition des jobs (briques)
  setup: # Job d'initialisation, parent des autres jobs
    runs-on: ubuntu-latest # OS utilisé pour ce job
    steps:
      - name: Setup (meta)
        run: echo "Setup job completed. Each job installs its own toolchain."

  build-test-backend: # Job pour build & test le backend (désactivé, fake NOK)
    runs-on: ubuntu-latest # OS utilisé
    needs: setup # Dépend du job setup (exécuté après)
    steps:
      - name: Wait backend (test circuit)
        run: |
          sleep 5
          exit 1 # Simule un échec

  build-test-frontend:
    uses: ./.github/workflows/build-test-frontend.yml
    needs: setup
    secrets: inherit
    with:
      # Ajoute ici des paramètres si besoin



  report-backend: # Job pour récupérer les rapports backend
    runs-on: ubuntu-latest
    needs: build-test-backend
    if: always()
    steps:
      - name: Wait for backend report (placeholder)
        run: sleep 5
        
  report-frontend: # Job pour récupérer les rapports frontend
    runs-on: ubuntu-latest
    needs: build-test-frontend
    if: always()
    steps:
      - name: Wait for frontend container to finish
        run: |
          # Attendre que le conteneur 'front' soit terminé
          until [ "$(docker inspect -f '{{.State.Status}}' front 2>/dev/null)" = "exited" ]; do
            echo "Attente de la fin du conteneur front..."
            sleep 2
          done
          echo "Conteneur front terminé."
          

  reports-merge: # Job commun après les deux récupérations de rapports
    runs-on: ubuntu-latest
    needs: [report-backend, report-frontend]
    if: always()
    steps:
      - name: Wait for both reports (placeholder)
        run: sleep 5


  cleanup: # Job de nettoyage final
    runs-on: ubuntu-latest
    needs: reports-merge # Attend la fin du job commun
    if: always()
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Cleanup (placeholder)
        run: echo "Cleanup runs after all reports are merged."

