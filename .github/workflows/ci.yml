  
name: CI Modular # Nom du workflow affiché dans GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: # Déclencheurs du workflow
  push: # Sur chaque push
    branches: [ '**' ] # Toutes les branches
  pull_request: # Sur chaque pull request
    branches: [ '**' ] # Toutes les branches

jobs: # Définition des jobs (briques)
  setup: # Job d'initialisation, parent des autres jobs
    runs-on: ubuntu-latest # OS utilisé pour ce job
    steps:
      - name: Setup (meta)
        run: echo "Setup job completed. Each job installs its own toolchain."

  test-application:
      runs-on: ubuntu-latest
      needs: setup
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Ensure run-tests.sh is executable
          run: chmod +x ./run-tests.sh
        - name: Run all tests (backend & frontend)
          run: ./run-tests.sh
        - name: Upload all JUnit test results
          uses: actions/upload-artifact@v4
          with:
            name: test-results-all
            path: test-results/*.xml

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: test-application
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx # Prépare l'outil Docker Buildx pour le build multi-plateforme
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry # Authentifie Docker auprès du registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Build Docker image # Build l'image Docker backend
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker build -t ghcr.io/$REPO:$TAG G-rez-l-int-gration-et-la-livraison-continue-Application-Java
      - name: Push Docker image # Pousse l'image Docker backend
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker push ghcr.io/$REPO:$TAG

  validate-docker-backend:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull backend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=backend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
          docker tag ghcr.io/$REPO:$TAG workshop-organizer
      - name: Validate backend with docker-compose
        run: |
          cd G-rez-l-int-gration-et-la-livraison-continue-Application-Java
          docker compose -f docker-compose.yml up -d
          sleep 60
          (curl -f http://localhost:8080/actuator/health || curl -f http://localhost:8080/) || (docker compose logs app && exit 1)
          docker compose down




  build-and-push-frontend:
    runs-on: ubuntu-latest # Utilise l'image Ubuntu pour le runner
    needs: test-application # Ce job dépend du job de test-application
    steps:
      - name: Checkout code # Récupère le code du repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx # Prépare l'outil Docker Buildx pour le build multi-plateforme
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry # Authentifie Docker auprès du registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io # Spécifie le registre
          username: ${{ github.actor }} # Utilise l'utilisateur GitHub
          password: ${{ secrets.ACTIONS_TOKEN }} # Utilise le token GitHub
      - name: Build Docker image # Build l'image Docker frontend
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker build -t ghcr.io/$REPO:$TAG G-rez-l-int-gration-et-la-livraison-continue-Application-Angular
      - name: Push Docker image # Pousse l'image Docker vers le registre GitHub
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker push ghcr.io/$REPO:$TAG
  
  validate-docker-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push-frontend    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}
      - name: Pull frontend image
        run: |
          REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          TAG=frontend-$(echo ${{ github.ref_name }} | tr '/' '-')-${{ github.sha }}
          docker pull ghcr.io/$REPO:$TAG
          docker tag ghcr.io/$REPO:$TAG workshop-front
      - name: Validate frontend with docker-compose
        run: |
          cd G-rez-l-int-gration-et-la-livraison-continue-Application-Angular
          docker compose -f docker-compose.yml up -d
          sleep 60
          curl -f http://localhost || (docker compose logs front && exit 1)
          docker compose down
         
  merge-report:
    runs-on: ubuntu-latest
    needs: [validate-docker-backend, validate-docker-frontend]
    if: always()
    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results-all
          path: test-results
      - name: Show test-results content
        run: ls -l test-results/
      - name: Merge and summarize test reports
        run: |
          echo "::group::JUnit Test Summary"
          count=$(ls test-results/*.xml 2>/dev/null | wc -l)
          if [ "$count" -gt 0 ]; then
            for file in test-results/*.xml; do
              echo "Report: $file"
              grep -E '<testcase|<failure|<error|<skipped' "$file" | head -n 20
            done
            echo "\nTotal reports found: $count"
          else
            echo "Aucun rapport JUnit XML trouvé dans test-results/."
          fi
          echo "::endgroup::"
          
  cleanup: # Job de nettoyage final
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cleanup (placeholder)
        run: echo "Cleanup runs after all validations and report merge."

