name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - G-rez-l-int-gration-et-la-livraison-continue-Application-Angular
          - G-rez-l-int-gration-et-la-livraison-continue-Application-Java
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js (for Angular)
        if: matrix.app == 'G-rez-l-int-gration-et-la-livraison-continue-Application-Angular'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (for Java)
        if: matrix.app == 'G-rez-l-int-gration-et-la-livraison-continue-Application-Java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests
        run: |
          chmod +x ./run-tests.sh
          ./run-tests.sh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.app }}
          path: test-results/*.xml

      - name: Upload coverage report (Angular only)
        if: matrix.app == 'G-rez-l-int-gration-et-la-livraison-continue-Application-Angular'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-angular
          path: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/coverage/
