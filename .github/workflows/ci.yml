name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Setup ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Test (docker-compose) ---
      - name: Build and run backend tests (docker-compose)
        run: |
          docker compose -f G-rez-l-int-gration-et-la-livraison-continue-Application-Java/docker-compose.yml up --build --abort-on-container-exit --exit-code-from app || docker-compose -f G-rez-l-int-gration-et-la-livraison-continue-Application-Java/docker-compose.yml logs

      # --- Results ---
      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: G-rez-l-int-gration-et-la-livraison-continue-Application-Java/build/test-results/test/*.xml

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Setup ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Test (docker-compose) ---
      - name: Build and run frontend tests (docker-compose)
        run: |
          docker compose -f G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/docker-compose.yml up --build --abort-on-container-exit --exit-code-from front || docker-compose -f G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/docker-compose.yml logs

      # --- Results ---
      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-frontend
          path: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/reports/*.xml

      - name: Upload coverage report (Angular)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-angular
          path: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/coverage/
